<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Smart - Fetch All Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .tab-active {
            border-bottom: 4px solid #2563eb;
            color: #2563eb;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-100 min-h-screen text-slate-800 font-sans">

    <div id="app-container" class="container mx-auto px-4 py-6 max-w-5xl">
        <header class="text-center mb-8">
            <div class="inline-block p-2 bg-white rounded-2xl shadow-sm mb-4">
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-700 uppercase tracking-tighter">
                    Absensi Smart Cloud
                </h1>
            </div>
            <div id="sync-status" class="flex items-center justify-center gap-2 text-slate-400 font-bold text-[10px] uppercase tracking-widest">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                <span id="status-text">Menghubungkan ke Cloud...</span>
            </div>
        </header>

        <main id="main-content" class="page-fade"></main>
    </div>

    <script>
        // --- KONFIGURASI ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwrBaYjh3MZLZX8aq4z-emJAZ-_tI4RtxSyXDLzDFYBZsk7wS5DNWzOG-6S_Cxo9evslQ/exec"; 

        let studentDatabase = {}; 
        let attendanceReports = [];
        let currentView = 'login';
        let activeGradeTab = 'XI'; // Default ke XI karena di gambar Anda XI yang ada datanya
        let isLoading = false;
        let searchQuery = "";

        // --- CLOUD DATA FETCHING ---
        async function refreshAllData() {
            if (!GAS_URL || GAS_URL.includes("GANTI_DENGAN_URL")) {
                updateStatus("Konfigurasi URL Belum Ada", "bg-red-500");
                return;
            }

            updateStatus("Menarik Data Spreadsheet...", "bg-amber-400");
            isLoading = true;
            if (currentView === 'dashboard') render(); 
            
            try {
                // Fetch tanpa filter agar semua data masuk
                const response = await fetch(`${GAS_URL}?action=getAllData&t=${Date.now()}`);
                const result = await response.json();
                
                studentDatabase = result.students || {};
                attendanceReports = result.attendance || [];
                
                updateStatus(`Berhasil Menarik ${attendanceReports.length} Data ✅`, "bg-green-500");
                console.log("Semua data diterima:", attendanceReports);
            } catch (e) {
                console.error("Fetch Error:", e);
                updateStatus("Gagal Menarik Data ❌", "bg-red-500");
            } finally {
                isLoading = false;
                render(); 
            }
        }

        function updateStatus(text, colorClass) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if(dot && txt) {
                dot.className = `w-2 h-2 rounded-full ${colorClass} transition-colors duration-500`;
                txt.innerText = text;
            }
        }

        async function sendAbsensiToCloud(report) {
            updateStatus("Mengirim Absen...", "bg-amber-400");
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'submitAbsen', ...report })
                });
                showToast("Berhasil Absen!");
                setTimeout(refreshAllData, 1500);
            } catch (e) { showToast("Gagal mengirim absensi"); }
        }

        // --- NAVIGATION ---
        function navigate(view) {
            currentView = view;
            render();
        }

        function handleAbsensi(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const d = new Date();
            const report = {
                nama: formData.get('nama'),
                kelas: formData.get('kelas'),
                tingkat: formData.get('kelas').split('.')[0],
                keterangan: formData.get('keterangan'),
                alasan: formData.get('alasan') || '-',
                timestamp: d.toLocaleTimeString('id-ID'),
                date: `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`
            };
            sendAbsensiToCloud(report);
            navigate('login');
        }

        // --- UI UTILS ---
        const generateClassOptions = () => {
            const levels = ['X', 'XI', 'XII'];
            let html = '<option value="">Pilih Kelas</option>';
            levels.forEach(lvl => {
                html += `<optgroup label="Tingkat ${lvl}">`;
                for (let i = 1; i <= 11; i++) {
                    const cls = `${lvl}.${i}`;
                    html += `<option value="${cls}">${cls}</option>`;
                }
                html += `</optgroup>`;
            });
            return html;
        };

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-[300] font-bold text-sm page-fade';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
        }

        function updateStudentList(kelas) {
            const selectNama = document.getElementById('select-nama');
            if(!selectNama) return;
            const names = studentDatabase[kelas] || [];
            selectNama.innerHTML = names.length === 0 ? '<option value="">(Kosong)</option>' : 
                '<option value="">-- Cari Nama --</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('');
        }

        // --- RENDERER ---
        function render() {
            const content = document.getElementById('main-content');
            if (!content) return;

            if (currentView === 'login') {
                content.innerHTML = `
                    <div class="max-w-md mx-auto space-y-6">
                        <div class="glass-card p-8 rounded-3xl shadow-xl text-center border border-white">
                            <h2 class="text-xl font-bold mb-6 text-slate-700">Selamat Datang</h2>
                            <div class="space-y-4">
                                <button onclick="navigate('form')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">📝 Masuk Form Absen</button>
                                <button onclick="navigate('dashboard')" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg hover:bg-slate-900 transition">📊 Monitoring Semua Data</button>
                            </div>
                            <button onclick="refreshAllData()" class="mt-8 text-[10px] font-bold text-blue-500 flex items-center justify-center gap-2 mx-auto">
                                ${isLoading ? '<div class="loading-spinner"></div>' : '🔄 Sinkronkan Data'}
                            </button>
                        </div>
                    </div>
                `;
            } else if (currentView === 'form') {
                content.innerHTML = `
                    <div class="max-w-xl mx-auto glass-card p-8 rounded-3xl shadow-2xl border border-white">
                        <div class="flex justify-between items-center mb-8">
                            <button onclick="navigate('login')" class="text-blue-600 font-bold text-xs uppercase tracking-widest">← Kembali</button>
                            <h2 class="text-lg font-black text-slate-800">Form Absensi</h2>
                        </div>
                        <form onsubmit="handleAbsensi(event)" class="space-y-5">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Pilih Kelas</label>
                                <select name="kelas" onchange="updateStudentList(this.value)" required class="w-full px-4 py-3 rounded-xl border outline-none">${generateClassOptions()}</select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Nama Lengkap</label>
                                <select name="nama" id="select-nama" required class="w-full px-4 py-3 rounded-xl border outline-none"><option value="">Pilih kelas dulu</option></select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Keterangan</label>
                                <select name="keterangan" required class="w-full px-4 py-3 rounded-xl border outline-none">
                                    <option value="Hadir">Hadir</option><option value="Sakit">Sakit</option><option value="Izin">Izin</option><option value="Alpa">Alpa</option>
                                </select>
                            </div>
                            <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl">SUBMIT ABSEN</button>
                        </form>
                    </div>
                `;
            } else if (currentView === 'dashboard') {
                // FILTER DATA BERDASARKAN TINGKAT DAN PENCARIAN (TANPA FILTER TANGGAL)
                const filtered = attendanceReports.filter(r => {
                    const matchesGrade = r.tingkat === activeGradeTab;
                    const matchesSearch = r.nama.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                         r.kelas.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                         String(r.date).includes(searchQuery);
                    return matchesGrade && matchesSearch;
                });
                
                const classStats = filtered.reduce((acc, r) => { 
                    acc[r.kelas] = (acc[r.kelas] || 0) + 1; 
                    return acc; 
                }, {});

                content.innerHTML = `
                    <div class="space-y-6">
                        <div class="flex flex-col md:flex-row gap-4 justify-between items-center bg-white p-4 rounded-2xl shadow-sm">
                            <button onclick="navigate('login')" class="px-4 py-2 bg-slate-100 rounded-xl text-xs font-bold uppercase">← Kembali</button>
                            
                            <input type="text" id="search-input" placeholder="Cari Nama/Kelas/Tanggal..." 
                                   value="${searchQuery}"
                                   oninput="searchQuery = this.value; render();"
                                   class="flex-1 max-w-md px-4 py-2 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-blue-200">

                            <button onclick="refreshAllData()" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold uppercase flex items-center gap-2">
                                ${isLoading ? '<div class="loading-spinner"></div>' : '🔄 Refresh Data'}
                            </button>
                        </div>

                        <div class="flex border-b border-slate-200">
                            ${['X', 'XI', 'XII'].map(g => `
                                <button onclick="activeGradeTab='${g}'; render();" class="flex-1 py-4 font-black text-xs tracking-widest ${activeGradeTab === g ? 'tab-active' : 'text-slate-400'}">TINGKAT ${g}</button>
                            `).join('')}
                        </div>

                        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                            <div class="p-5 bg-slate-50 border-b flex justify-between items-center">
                                <h3 class="font-black text-xs uppercase text-slate-500">Tabel Monitoring (Semua Tanggal)</h3>
                                <span class="bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-full">${filtered.length} Entri</span>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-slate-100 text-[10px] font-black uppercase text-slate-400">
                                        <tr>
                                            <th class="px-6 py-3">Nama & Kelas</th>
                                            <th class="px-6 py-3">Keterangan</th>
                                            <th class="px-6 py-3">Waktu & Tanggal</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        ${filtered.length === 0 ? '<tr><td colspan="3" class="p-10 text-center text-slate-400 italic">Tidak ada data ditemukan untuk filter ini.</td></tr>' : 
                                        filtered.map(r => `
                                            <tr class="hover:bg-slate-50 transition">
                                                <td class="px-6 py-4">
                                                    <div class="font-bold text-slate-700">${r.nama}</div>
                                                    <div class="text-[9px] text-blue-500 font-bold uppercase">${r.kelas}</div>
                                                </td>
                                                <td class="px-6 py-4">
                                                    <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${r.keterangan === 'Hadir' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                                                        ${r.keterangan}
                                                    </span>
                                                </td>
                                                <td class="px-6 py-4">
                                                    <div class="text-xs text-slate-600">${r.date}</div>
                                                    <div class="text-[9px] text-slate-400">${r.timestamp}</div>
                                                </td>
                                            </tr>
                                        `).reverse().join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
                // Kembalikan fokus ke input search jika sedang mengetik
                if (searchQuery !== "") {
                    const input = document.getElementById('search-input');
                    input.focus();
                    input.setSelectionRange(searchQuery.length, searchQuery.length);
                }
            }
        }

        window.onload = refreshAllData;
    </script>
</body>
</html>
